<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Pro — Kitchen</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .kd-col { display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
    .kd-col-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-radius:var(--radius-sm); font-weight:700; font-size:14px; flex-shrink:0; }
    .kd-pending-hdr { background:var(--yellow-s); color:var(--yellow); border:1px solid var(--yellow); }
    .kd-cooking-hdr { background:var(--blue-s);   color:var(--blue);   border:1px solid var(--blue); }
    .kd-ready-hdr   { background:var(--green-s);  color:var(--green);  border:1px solid var(--green); }
    .kd-cnt { background:rgba(0,0,0,.2); border-radius:999px; padding:2px 10px; font-size:12px; }
    .kd-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; height:calc(100vh - 60px - 80px); }
    @media(max-width:768px){ .kd-grid{ grid-template-columns:1fr; height:auto; } }
  </style>
</head>
<body>
<div class="page-loader" id="pageLoader"><div style="text-align:center"><div class="spinner" style="margin:0 auto 14px"></div></div></div>
<div class="app-shell">
  <nav class="sidebar" id="appSidebar"></nav>
  <div class="main-area">
    <div class="topbar" id="appTopbar"></div>
    <div class="page-content fade-in" style="padding-bottom:0">

      <div class="section-hdr mb-3" style="flex-shrink:0">
        <div>
          <h2 class="section-title">Kitchen Display</h2>
          <p class="text-m" style="font-size:12px;margin:0">Real-time order queue</p>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="pulse g"></span>
          <span style="font-size:12px;color:var(--text-3)" id="kdClock">—</span>
        </div>
      </div>

      <div class="kd-grid">

        <!-- Pending -->
        <div style="display:flex;flex-direction:column;gap:10px;overflow:hidden">
          <div class="kd-col-header kd-pending-hdr">
            <span>⏳ Pending</span>
            <span class="kd-cnt" id="cntPending">0</span>
          </div>
          <div class="kd-col scroll-y" id="colPending"></div>
        </div>

        <!-- Cooking -->
        <div style="display:flex;flex-direction:column;gap:10px;overflow:hidden">
          <div class="kd-col-header kd-cooking-hdr">
            <span>🔥 Cooking</span>
            <span class="kd-cnt" id="cntCooking">0</span>
          </div>
          <div class="kd-col scroll-y" id="colCooking"></div>
        </div>

        <!-- Ready -->
        <div style="display:flex;flex-direction:column;gap:10px;overflow:hidden">
          <div class="kd-col-header kd-ready-hdr">
            <span>✅ Ready</span>
            <span class="kd-cnt" id="cntReady">0</span>
          </div>
          <div class="kd-col scroll-y" id="colReady"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let liveOrders = [];
let timerTick;

requireAuth(user => {
  buildSidebar(user.uid);
  buildTopbar('Kitchen', 'Live order queue');
  loadSidebarUser(user);
  startSubscription();
  startClock();
  Loader.hide();
});

function startClock() {
  const el = document.getElementById('kdClock');
  const tick = () => { if (el) el.textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); };
  tick();
  setInterval(tick, 1000);
}

function startSubscription() {
  db.collection(C.ORDERS)
    .where('status', 'in', ['Pending', 'Cooking', 'Ready'])
    .orderBy('createdAt', 'asc')
    .onSnapshot(snap => {
      liveOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }, e => Toast.error(e.message));

  // Refresh timer display every second
  clearInterval(timerTick);
  timerTick = setInterval(updateTimers, 1000);
}

function elapsedSec(ts) {
  if (!ts) return 0;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return Math.floor((Date.now() - d.getTime()) / 1000);
}

function timerHtml(order) {
  const ts  = order.pendingAt || order.cookingAt || order.createdAt;
  const sec = elapsedSec(ts);
  const m   = Math.floor(sec / 60);
  const s   = sec % 60;
  const label = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (sec < 600)  return `<span class="timer-ok">${label}</span>`;
  if (sec < 1200) return `<span class="timer-warn">${label}</span>`;
  return `<span class="timer-alert">${label}</span>`;
}

function cardHtml(order) {
  const nextMap = { Pending: ['Cooking','Cancelled'], Cooking: ['Ready','Cancelled'], Ready: ['Served'] };
  const next = nextMap[order.status] || [];
  const sym  = localStorage.getItem('rms_currency') || '₨';

  let items = '';
  for (const item of (order.items || [])) {
    items += `<li><span>${escHtml(item.name)}</span><span class="kd-qty">${item.qty}×</span></li>`;
  }

  let btns = '';
  for (const s of next) {
    const cls = s === 'Cancelled' ? 'btn-d btn-sm' : 'btn-p btn-sm';
    const lbl = s === 'Cancelled' ? '❌ Cancel' : '→ ' + s;
    btns += `<button class="${cls}" onclick="advance('${order.id}','${s}')" style="width:100%;justify-content:center;margin-top:4px">${lbl}</button>`;
  }

  const tableLbl = order.tableNumber ? 'Table ' + order.tableNumber : (order.type || 'Takeaway');

  return `
    <div class="kd-card kd-${(order.status||'').toLowerCase()}" data-id="${order.id}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px">
        <div>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="order-num-badge" style="width:30px;height:30px;font-size:12px">${order.orderNumber || '?'}</span>
            <div>
              <div class="kd-num">${escHtml(tableLbl)}</div>
              <div class="kd-id">${escHtml(order.type || '')}</div>
            </div>
          </div>
        </div>
        <div class="kd-timer" data-id="${order.id}">${timerHtml(order)}</div>
      </div>
      <ul class="kd-items">${items}</ul>
      ${order.notes ? `<div style="font-size:11px;color:var(--text-3);margin-top:6px;padding:5px 8px;background:var(--yellow-s);border-radius:5px">📝 ${escHtml(order.notes)}</div>` : ''}
      <div style="margin-top:8px">${btns}</div>
    </div>`;
}

function render() {
  const groups = { Pending: [], Cooking: [], Ready: [] };
  liveOrders.forEach(o => {
    if (groups[o.status]) groups[o.status].push(o);
  });

  document.getElementById('cntPending').textContent = groups.Pending.length;
  document.getElementById('cntCooking').textContent = groups.Cooking.length;
  document.getElementById('cntReady').textContent   = groups.Ready.length;

  const empty = `<div class="empty-st" style="padding:28px"><div class="ei" style="font-size:30px">✅</div><div class="et">Clear!</div></div>`;
  document.getElementById('colPending').innerHTML = groups.Pending.length ? groups.Pending.map(cardHtml).join('') : empty;
  document.getElementById('colCooking').innerHTML = groups.Cooking.length ? groups.Cooking.map(cardHtml).join('') : empty;
  document.getElementById('colReady').innerHTML   = groups.Ready.length   ? groups.Ready.map(cardHtml).join('')   : empty;
}

function updateTimers() {
  document.querySelectorAll('.kd-timer[data-id]').forEach(el => {
    const id    = el.getAttribute('data-id');
    const order = liveOrders.find(o => o.id === id);
    if (order) el.innerHTML = timerHtml(order);
  });
}

async function advance(orderId, newStatus) {
  try {
    const updates = { status: newStatus };
    updates[newStatus.toLowerCase() + 'At'] = firebase.firestore.FieldValue.serverTimestamp();
    await db.collection(C.ORDERS).doc(orderId).update(updates);
    await logActivity('order_advanced', { orderId, status: newStatus });
    Toast.success('→ ' + newStatus);
  } catch (e) { Toast.error(e.message); }
}
</script>
</body>
</html>
